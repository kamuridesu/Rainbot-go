name: push changes

on:
  workflow_dispatch:
  release:
    types:
      - created

env:
  IMAGE_NAME: rainbot
  CURRENT_TAG: ${{ github.event.release.tag_name }}
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  REGISTRY_USER: ${{ github.actor }}
  REGISTRY_PASSWORD: ${{ github.token }}
  VALUES_REPO: ${{ secrets.VALUES_REPO }}
  VALUES_FILE_PATH: ${{ secrets.VALUES_FILE_PATH }}
  DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

permissions:
  packages: write

jobs:
  build-archs:
    name: Build & Push (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ env.CURRENT_TAG }}-${{ matrix.arch }} ${{ github.sha }}-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          containerfiles: |
            ./Dockerfile

      - name: Push arch-specific image to ghcr
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image.outputs.image }}
          tags: ${{ steps.build-image.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-22.04
    needs: build-archs
    steps:
      - name: Log in to ghcr
        run: echo "${{ env.REGISTRY_PASSWORD }}" | buildah login -u "${{ env.REGISTRY_USER }}" --password-stdin ${{ env.IMAGE_REGISTRY }}

      - name: Create and push manifests
        run: |
          IMAGE="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAGS=("${{ env.CURRENT_TAG }}" "${{ github.sha }}" "latest")

          for TAG in "${TAGS[@]}"; do
            if [ -z "$TAG" ]; then continue; fi
            
            echo "Creating manifest for $IMAGE:$TAG"
            buildah manifest create $IMAGE:$TAG
            
            buildah manifest add $IMAGE:$TAG docker://$IMAGE:${{ github.sha }}-amd64
            buildah manifest add $IMAGE:$TAG docker://$IMAGE:${{ github.sha }}-arm64
            
            buildah manifest push --all $IMAGE:$TAG docker://$IMAGE:$TAG
          done

  deploy:
    name: "notify cd repo"
    runs-on: ubuntu-22.04
    needs: create-manifest
    steps:
      - name: trigger update in values repo
        uses: peter-evans/repository-dispatch@v4
        with:
          repository: ${{ env.VALUES_REPO }}
          token: ${{ env.DEPLOY_TOKEN }}
          event-type: "update-version"
          client-payload: >-
            {
              "version": "${{ env.CURRENT_TAG }}",
              "image_name": "${{ env.IMAGE_NAME }}",
              "file_path": "${{ env.VALUES_FILE_PATH }}"
            }
